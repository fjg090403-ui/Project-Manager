server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: saas-project-manager-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saas_pm}
    username: ${SPRING_DATASOURCE_USERNAME:saas}
    password: ${SPRING_DATASOURCE_PASSWORD:saas}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
