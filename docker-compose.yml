services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-pm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_pm}
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas} -d ${POSTGRES_DB:-saas_pm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: saas-pm-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-saas_pm}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-saas}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-saas}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4200,http://localhost:8081,http://localhost:8082}
    ports:
      - "8080:8080"

  realtime-service:
    build: ./realtime-service
    container_name: saas-pm-realtime
    environment:
      REALTIME_PORT: 4000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4200,http://localhost:8081,http://localhost:8082}
    ports:
      - "4000:4000"

  frontend-app:
    build: ./frontend-app
    container_name: saas-pm-frontend-app
    depends_on:
      - backend
    ports:
      - "8081:80"

  frontend-admin:
    build: ./frontend-admin
    container_name: saas-pm-frontend-admin
    depends_on:
      - backend
    ports:
      - "8082:80"

volumes:
  postgres-data:
